name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22.x is the supported floor; 24.x provides forward-compatibility coverage.
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # Block dependency install scripts by default, then rebuild only the four packages
      # whose native/binary installation is required by the application.
      - run: npm ci --ignore-scripts
      # Add any future native dependency here and in deploy-bot.yml.
      - run: npm rebuild better-sqlite3 @discordjs/opus esbuild ffmpeg-static
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
