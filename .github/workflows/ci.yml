name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22.x = piso real (o @discordjs/voice exige >=22.12; o VPS corre 22).
        # 24.x = cobertura forward (a máquina de dev corre 24). O 20.x saiu:
        # era um alvo que a dependência core já não suporta (EBADENGINE).
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # sec(031): scripts de install BLOQUEADOS por omissão (--ignore-scripts) — reduz
      # a superfície de RCE no install de 363 deps (todo o grafo transitivo) para só
      # as 4 que PRECISAM de correr o próprio script (fetch de binário/prebuild
      # nativo): better-sqlite3, @discordjs/opus, esbuild, ffmpeg-static. Reconstruídas
      # a seguir, explicitamente (sodium-native e @snazzah/davey, usado pelo
      # @discordjs/voice, não têm install script — prebuilds via optionalDependencies —
      # por isso não entram nesta lista).
      - run: npm ci --ignore-scripts
      # Novo dep nativo? Junta-o aqui E ao passo homólogo em deploy-bot.yml — sem isto
      # o `require()` falha em runtime com o binário nativo por compilar/descarregar.
      - run: npm rebuild better-sqlite3 @discordjs/opus esbuild ffmpeg-static
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npx vitest run
