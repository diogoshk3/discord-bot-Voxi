name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22.x is the supported floor; 24.x provides forward-compatibility coverage.
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # Block dependency install scripts by default, then rebuild only the four packages
      # whose native/binary installation is required by the application.
      - run: npm ci --ignore-scripts
      # Add any future native dependency here and in deploy-bot.yml.
      - run: npm rebuild better-sqlite3 @discordjs/opus esbuild ffmpeg-static
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage

  # Site-specific gate used by both pull requests and the Pages deployment. Keeping this
  # separate from the native bot matrix makes the deploy gate fast while still testing the
  # exact static bundle that will be uploaded.
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # Vitest loads esbuild. Rebuild only that audited binary after globally blocking
      # dependency install scripts, matching the allow-list posture of the main CI job.
      - run: npm rebuild esbuild
      - run: npm run check:site
