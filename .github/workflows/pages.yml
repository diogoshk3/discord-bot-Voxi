name: Deploy site to GitHub Pages

# Publica o site em GitHub Pages, MINIFICADO. O passo build:site gera site-dist/ a
# partir de site/ (index.html + css/js minificados; privacy/terms ficam legiveis) e e
# essa pasta que se publica. O configure-pages (enablement: true) LIGA o Pages sozinho
# na 1a corrida. Cada push a main que altere site/ ou o script de build redeploya.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'tools/minify-site.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma so publicacao de cada vez; nao cancela um deploy a meio.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      # Install scripts BLOQUEADOS (mesma postura de supply-chain do ci.yml/deploy-bot.yml,
      # plano 031) — este job tem pages:write + id-token:write, por isso não pode correr o
      # postinstall de 363 deps. O build:site só usa html-minifier-terser/terser/clean-css
      # (JS puro), logo não é preciso reconstruir nenhum binário nativo aqui.
      - run: npm ci --ignore-scripts
      - name: Build minified site (site/ -> site-dist/)
        run: npm run build:site
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site-dist
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
