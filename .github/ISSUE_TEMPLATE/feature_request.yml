name: Feature request
description: Suggest an improvement to Vozen
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first. A clear use case is more useful than a feature name alone.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Who needs this, and what can they not do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the behavior you would like, including an example if useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or different approaches have you tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, accessibility needs, or related projects here.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find the same request.
          required: true
        - label: I explained the user problem, not only the proposed implementation.
          required: true
