<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'"
    >
    <title>Page not found — Vozen</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/main-v42.css">
    <style>
      .not-found {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        text-align: center;
      }
      .not-found__card {
        width: min(620px, 100%);
        padding: clamp(32px, 7vw, 64px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(16, 19, 34, 0.88);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.36);
      }
      .not-found__card .brand {
        justify-content: center;
        margin-bottom: 28px;
      }
      .not-found__code {
        margin: 0 0 8px;
        color: var(--aqua);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.16em;
      }
      .not-found h1 {
        margin: 0;
        font-size: clamp(2.1rem, 8vw, 4.6rem);
        line-height: 0.98;
      }
      .not-found p {
        max-width: 44ch;
        margin: 20px auto 30px;
        color: var(--text-1);
        font-size: 1.05rem;
      }
      .not-found__actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <section class="not-found__card" aria-labelledby="notFoundTitle">
        <a class="brand" href="/" aria-label="Vozen home">
          <span class="brand__mark" aria-hidden="true"><span class="eq"><i></i><i></i><i></i><i></i><i></i></span></span>
          <span class="brand__word">Vozen</span>
        </a>
        <div class="not-found__code">ERROR 404</div>
        <h1 id="notFoundTitle">This page went quiet.</h1>
        <p>The address may have changed, but Vozen is still here. Return home or ask us for help.</p>
        <div class="not-found__actions">
          <a class="btn btn--primary" href="/">Back to Vozen</a>
          <a class="btn btn--ghost" href="https://discord.gg/4kYw2WUbNN" target="_blank" rel="noopener noreferrer">Get support</a>
        </div>
      </section>
    </main>
  </body>
</html>
