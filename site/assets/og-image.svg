<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a16"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6672ff"/>
      <stop offset="1" stop-color="#2ee6c8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="24%" r="55%">
      <stop offset="0" stop-color="#6672ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6672ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="82%" r="55%">
      <stop offset="0" stop-color="#2ee6c8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2ee6c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- brand row -->
  <g transform="translate(84,74)">
    <rect x="0" y="0" width="52" height="52" rx="13" fill="#0a0c1a"/>
    <g fill="url(#accent)" transform="translate(10,10)">
      <rect x="0"  y="12" width="5" height="10" rx="2.5"/>
      <rect x="8"  y="6"  width="5" height="22" rx="2.5"/>
      <rect x="16" y="0"  width="5" height="34" rx="2.5"/>
      <rect x="24" y="6"  width="5" height="22" rx="2.5"/>
      <rect x="32" y="12" width="5" height="10" rx="2.5"/>
    </g>
    <text x="70" y="37" font-family="'Unbounded','Segoe UI',Arial,sans-serif" font-weight="800"
          font-size="34" fill="#ffffff" letter-spacing="0.5">Vozen</text>
  </g>

  <!-- headline -->
  <text x="84" y="272" font-family="'Unbounded','Segoe UI',Arial,sans-serif" font-weight="800"
        font-size="82" fill="#ffffff">Discord TTS in</text>
  <text x="84" y="366" font-family="'Unbounded','Segoe UI',Arial,sans-serif" font-weight="800"
        font-size="82" fill="url(#accent)">35 languages.</text>

  <!-- subline -->
  <text x="86" y="430" font-family="'Outfit','Segoe UI',Arial,sans-serif" font-weight="500"
        font-size="31" fill="#b7bdd6">Reads your chat aloud in any voice channel · 13 games · neural voices</text>

  <!-- free pill -->
  <g transform="translate(86,470)">
    <rect x="0" y="0" width="316" height="52" rx="26" fill="rgba(46,230,200,0.12)" stroke="#2ee6c8" stroke-opacity="0.45"/>
    <circle cx="30" cy="26" r="6" fill="#2ee6c8"/>
    <text x="50" y="34" font-family="'JetBrains Mono','Segoe UI',Arial,monospace" font-weight="700"
          font-size="22" fill="#7cf5e2">Core free forever</text>
  </g>

  <!-- waveform baseline -->
  <g fill="url(#accent)" opacity="0.92" transform="translate(84,600)">
    <rect x="0"    y="-16" width="7" height="16" rx="3.5"/>
    <rect x="16"   y="-34" width="7" height="34" rx="3.5"/>
    <rect x="32"   y="-58" width="7" height="58" rx="3.5"/>
    <rect x="48"   y="-30" width="7" height="30" rx="3.5"/>
    <rect x="64"   y="-46" width="7" height="46" rx="3.5"/>
    <rect x="80"   y="-72" width="7" height="72" rx="3.5"/>
    <rect x="96"   y="-40" width="7" height="40" rx="3.5"/>
    <rect x="112"  y="-22" width="7" height="22" rx="3.5"/>
    <rect x="128"  y="-52" width="7" height="52" rx="3.5"/>
    <rect x="144"  y="-84" width="7" height="84" rx="3.5"/>
    <rect x="160"  y="-48" width="7" height="48" rx="3.5"/>
    <rect x="176"  y="-28" width="7" height="28" rx="3.5"/>
    <rect x="192"  y="-60" width="7" height="60" rx="3.5"/>
    <rect x="208"  y="-38" width="7" height="38" rx="3.5"/>
    <rect x="224"  y="-18" width="7" height="18" rx="3.5"/>
  </g>

  <!-- right-side oversized waveform motif -->
  <g fill="url(#accent)" opacity="0.16" transform="translate(792,150)">
    <rect x="0"   y="90"  width="26" height="150" rx="13"/>
    <rect x="46"  y="30"  width="26" height="270" rx="13"/>
    <rect x="92"  y="-30" width="26" height="390" rx="13"/>
    <rect x="138" y="60"  width="26" height="210" rx="13"/>
    <rect x="184" y="120" width="26" height="90"  rx="13"/>
    <rect x="230" y="10"  width="26" height="310" rx="13"/>
  </g>
</svg>
