# Voxi — type it, hear it.
# Stack de deploy hosted para VPS. Constroi a imagem a partir do Dockerfile,
# le os segredos/tunables do .env, e monta volumes persistentes para os dados e
# read-only para o Piper + modelos.
#
# Arranque:   docker compose up -d --build
# Logs:       docker compose logs -f voxi
# Parar:      docker compose down

services:
  voxi:
    build: .
    # Reinicia sempre (excepto se for parado a mao). Suporta a promessa de
    # fiabilidade: se o processo morrer ou a VPS reiniciar, o bot volta a subir.
    restart: unless-stopped

    # Variaveis com VALORES FIXOS de caminho dentro do container. Apontam o bot
    # para os volumes montados abaixo. Mantidas aqui (e nao no .env) para evitar
    # que o utilizador desalinhe caminhos vs volumes por engano.
    environment:
      # SQLite. A cache de audio e criada em /data/audio-cache/ (irma da DB),
      # por isso o volume 'data' cobre DB + WAL/SHM + cache num so sitio.
      DB_PATH: /data/tts.db
      # Pasta dos modelos de voz .onnx (+ .onnx.json), montada read-only.
      MODELS_DIR: /models
      # Binario do Piper DENTRO da pasta extraida do release Linux. O Piper
      # depende de .so vizinhos (libonnxruntime, libespeak-ng, espeak-ng-data/),
      # por isso montamos a pasta inteira e apontamos para o executavel la dentro.
      PIPER_PATH: /opt/piper/piper

    # Segredos e tunables do utilizador. Preenche o .env a partir do
    # .env.example. Obrigatorias: DISCORD_TOKEN, CLIENT_ID.
    # Opcionais: DEFAULT_VOICE, DEFAULT_SPEED, INACTIVITY_MS, QUEUE_CAP,
    # MAX_CHARS, RATE_PER_MIN, LOG_LEVEL, TTS_ENGINE, OPENAI_API_KEY.
    # NOTA: NAO definas DB_PATH / MODELS_DIR / PIPER_PATH no .env — vem de cima
    # com os caminhos do container.
    env_file:
      - .env

    volumes:
      # Dados persistentes: base de dados SQLite + WAL/SHM + cache de audio.
      # Volume NOMEADO (gerido pelo Docker) para o utilizador 'node' (uid 1000)
      # ter permissao de escrita sem problemas de ownership de bind-mount.
      - data:/data
      # Pasta com os modelos .onnx do Piper no host. Read-only: o bot so le.
      # Ajusta ./models para onde colocaste os modelos na VPS.
      - ./models:/models:ro
      # Pasta extraida do release Linux do Piper no host (binario + .so + dados
      # do espeak-ng). Read-only. Ajusta ./piper para onde extraiste o Piper.
      - ./piper:/opt/piper:ro

# Volume nomeado para os dados. Persiste entre 'docker compose up/down'; so e
# removido com 'docker compose down -v'.
volumes:
  data:
